name: Frontend Deploy (Template)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy-frontend:
    runs-on: ubuntu-latest
    env:
      FRONTEND_HOOK: ${{ secrets.FRONTEND_DEPLOY_HOOK_URL }}
    steps:
      - name: Trigger frontend deploy hook
        shell: bash
        run: |
          if [ -z "${FRONTEND_HOOK}" ]; then
            echo "Skipping frontend deploy: FRONTEND_DEPLOY_HOOK_URL is not configured."
            exit 0
          fi
          curl -fsS -X POST "${FRONTEND_HOOK}"
